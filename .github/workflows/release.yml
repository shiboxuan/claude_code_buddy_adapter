# 三平台 Nuitka 打包 + GitHub Release。
# 触发：push tag v*（自动出 release）/ 手动 workflow_dispatch。
# 产物：macOS x86_64、macOS arm64、Windows x86_64 单文件可执行。
#
# 架构说明：Nuitka 不支持交叉编译，每个平台用对应架构的 GitHub runner 本机构建--
# macos-13=Intel x86_64、macos-14=Apple Silicon arm64、windows-latest=Windows x86_64。
name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag（如 v0.1.1；留空则用 v0.1.0-ci.<run>）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            label: macos-x86_64
            artifact: buddy-adapter-macos-x86_64
          - os: macos-14
            label: macos-arm64
            artifact: buddy-adapter-macos-arm64
          - os: windows-latest
            label: windows-x86_64
            artifact: buddy-adapter-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        # 不拉 docs submodule（GitLab 私有，打包不需要）

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Nuitka 打包
        shell: bash
        env:
          PYTHON: python
        run: bash scripts/build.sh --output-name "${{ matrix.artifact }}"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.exe
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理 release 文件
        shell: bash
        run: |
          set -e
          mkdir -p release
          find artifacts -type f -print -exec cp {} release/ \;
          echo "--- release 文件 ---"
          ls -la release/

      - name: 确定 tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            T="${{ inputs.release_tag }}"
            [ -z "$T" ] && T="v0.1.0-ci.${{ github.run_number }}"
            echo "tag=$T" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
